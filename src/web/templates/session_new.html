<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Create Import Session</title>
</head>
<body>
  <h2>Create Import Session</h2>

  <p>Operator: <b>{{ operator_id }}</b></p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <ul>
        {% for cat, msg in messages %}
          <li><b>{{ cat }}</b>: {{ msg }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}

  <form method="post" action="{{ url_for('ingestion.create_session') }}">
    <div>
      <label>UUT Serial Number:</label>
      <input name="uut_serial" required placeholder="Enter Serial Number">
    </div>

    <button type="submit">Create Session</button>
  </form>

  <br>
  <a href="{{ url_for('ingestion.dashboard') }}">← Back to Dashboard</a>
</body>
</html>
