<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Create Job</title>
</head>
<body>
  <h2>Create Job</h2>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <ul>
        {% for cat, msg in messages %}
          <li><b>{{ cat }}</b>: {{ msg }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}

  <form method="post" action="{{ url_for('ingestion.create_job') }}">
    <div>
      <label>Job ID:</label>
      <input name="job_id" required placeholder="e.g. JOB_001">
    </div>
    <button type="submit">Create Job</button>
  </form>

  <br>
  <a href="{{ url_for('ingestion.dashboard') }}">← Back to Dashboard</a>
</body>
</html>
