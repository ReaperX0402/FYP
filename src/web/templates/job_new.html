<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Job</title>
  <link rel="stylesheet" href="{% static 'css/job_new.css' %}">
</head>
<body>
  <main class="page-shell">
    <section class="panel">
      <header>
        <h2>Create Job</h2>
        <p>Start a new production job for media ingestion.</p>
      </header>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <ul class="flash-list">
            {% for cat, msg in messages %}
              <li class="flash-item flash-{{ cat }}"><b>{{ cat }}</b>: {{ msg }}</li>
            {% endfor %}
          </ul>
        {% endif %}
      {% endwith %}

      <form class="form-stack" method="post" action="{{ url_for('ingestion.create_job') }}">
        <div class="field-group">
          <label for="job_id">Job ID:</label>
          <input id="job_id" name="job_id" required placeholder="e.g. JOB_001">
        </div>
        <button type="submit">Create Job</button>
      </form>

      <a class="back-link" href="{{ url_for('ingestion.dashboard') }}">← Back to Dashboard</a>
    </section>
  </main>
</body>
</html>
